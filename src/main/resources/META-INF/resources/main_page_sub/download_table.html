<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- download.css 연결 -->
    <link rel="stylesheet" href="../css/download.css" />

    <title>시스템 사양</title>
  </head>

  <body>
    <!-- 시스템 사양 -->
    <div class="container my-5 text-center">
      <h2 class="accent-purple mb-4">권장 시스템 사양</h2>

      <!-- 운영체제 버튼 -->
      <div class="mb-4">
        <button class="btn btn-outline-light me-2">Windows</button>
        <button class="btn btn-outline-light">Mac</button>
      </div>

      <!-- 시스템 사양 표 -->
      <div class="table-responsive">
        <table class="table table-dark table-bordered table-hover">
          <thead>
            <tr>
              <th>항목</th>
              <th>권장 사양</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>운영체제</td>
              <td>Windows 10 이상</td>
            </tr>

            <tr>
              <td>CPU</td>
              <td>Intel i5급 이상</td>
            </tr>

            <tr>
              <td>메모리</td>
              <td>8GB RAM 이상</td>
            </tr>

            <tr>
              <td>그래픽</td>
              <td>외장 그래픽 카드 권장</td>
            </tr>

            <tr>
              <td>저장 공간</td>
              <td>20GB 이상 여유 공간</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
